<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>إدارة الموظفين — Everest Ads · ديمو</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --background: oklch(0.99 0 0);
    --foreground: oklch(0.145 0 0);
    --card: oklch(1 0 0);
    --muted: oklch(0.97 0 0);
    --muted-foreground: oklch(0.556 0 0);
    --border: oklch(0.92 0 0);
    --primary: oklch(0.205 0 0);
    --primary-foreground: oklch(0.985 0 0);
    --success: oklch(0.6 0.18 145);
    --warning: oklch(0.75 0.18 80);
    --danger: oklch(0.6 0.22 25);
    --info: oklch(0.65 0.18 250);
    --accent-purple: oklch(0.6 0.18 300);
  }
  body { font-family: "Cairo", system-ui, sans-serif; background: var(--background); color: var(--foreground); }
  .text-muted { color: var(--muted-foreground); }
  .border-default { border-color: var(--border); }
  .bg-card { background: var(--card); }
  .bg-muted { background: var(--muted); }
  .bg-primary { background: var(--primary); }
  .text-primary { color: var(--primary); }
  .text-primary-fg { color: var(--primary-foreground); }
  .badge-success { background: oklch(0.94 0.06 145); color: oklch(0.35 0.12 145); }
  .badge-warning { background: oklch(0.94 0.06 80); color: oklch(0.4 0.14 80); }
  .badge-danger { background: oklch(0.94 0.06 25); color: oklch(0.4 0.16 25); }
  .badge-info { background: oklch(0.94 0.06 250); color: oklch(0.4 0.16 250); }
  .badge-purple { background: oklch(0.94 0.05 300); color: oklch(0.4 0.16 300); }
  .badge-muted { background: var(--muted); color: var(--muted-foreground); }
  .dot-success { background: var(--success); }
  .dot-warning { background: var(--warning); }
  .dot-danger { background: var(--danger); }
  .progress-bar { height: 6px; background: var(--muted); border-radius: 999px; overflow: hidden; }
  .progress-bar > div { height: 100%; border-radius: 999px; }
  .task-card { transition: transform .12s ease, box-shadow .12s ease; }
  .task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.06); }
  .nav-item { color: var(--muted-foreground); cursor: pointer; }
  .nav-item:hover { background: var(--muted); color: var(--foreground); }
  .nav-item.active { background: var(--primary); color: var(--primary-foreground); }
  .avatar { display:inline-flex; align-items:center; justify-content:center; border-radius:9999px; font-weight:700; font-size:11px; color:#fff; }
  .av-1 { background: oklch(0.55 0.18 260); }
  .av-2 { background: oklch(0.6 0.18 300); }
  .av-3 { background: oklch(0.62 0.18 145); }
  .av-4 { background: oklch(0.7 0.18 50); }
  .av-5 { background: oklch(0.55 0.18 25); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.85 0 0); border-radius: 8px; }
  .view { display: none; }
  .view.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; }
  .btn-primary { background: var(--primary); color: var(--primary-foreground); }
  .btn-primary:hover { opacity: .9; }
  .seg button.on { background: var(--primary); color: var(--primary-foreground); }
</style>
</head>
<body class="min-h-screen">

<div class="flex min-h-screen">

  <!-- =================== Sidebar =================== -->
  <aside class="w-64 shrink-0 border-default border-l bg-card flex flex-col sticky top-0 h-screen">
    <div class="border-default border-b p-4 flex items-center justify-between">
      <div>
        <div class="text-sm font-bold">إدارة الموظفين</div>
        <div class="text-xs text-muted">Everest Ads</div>
      </div>
      <button onclick="go('notifications')" class="relative inline-flex size-9 items-center justify-center rounded-md text-muted hover:bg-[var(--muted)]" aria-label="notifications">
        <i data-lucide="bell" class="size-5"></i>
        <span class="absolute -top-1 -end-1 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-[var(--danger)] px-1 text-[10px] font-bold text-white">3</span>
      </button>
    </div>

    <nav id="nav" class="flex flex-col gap-1 p-3 flex-1 overflow-y-auto"></nav>

    <div class="p-3 border-default border-t">
      <button class="flex w-full items-center gap-3 rounded-md px-3 py-2 text-sm font-medium nav-item">
        <i data-lucide="log-out" class="size-4"></i> تسجيل الخروج
      </button>
    </div>
  </aside>

  <!-- =================== Main =================== -->
  <main class="flex-1 min-w-0">

    <!-- Top bar -->
    <header class="sticky top-0 z-10 flex items-center justify-between gap-4 border-default border-b bg-card/80 backdrop-blur px-6 py-3">
      <div class="relative hidden md:block">
        <i data-lucide="search" class="size-4 absolute top-1/2 -translate-y-1/2 start-3 text-muted"></i>
        <input type="text" placeholder="ابحث عن مشروع، تاسك، أو موظف..." class="h-10 w-80 rounded-md border border-default bg-card ps-9 pe-3 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primary)]" />
      </div>
      <div class="flex items-center gap-3">
        <span class="hidden sm:inline-flex items-center gap-1.5 rounded-full badge-success px-3 py-1 text-xs font-medium">
          <i data-lucide="shield-check" class="size-3.5"></i> مدير عام
        </span>
        <div class="flex items-center gap-2">
          <span class="avatar av-1 size-9">أج</span>
          <div class="hidden sm:block leading-tight">
            <div class="text-sm font-semibold">أحمد الجمل</div>
            <div class="text-[11px] text-muted">ahmed@everestads.com</div>
          </div>
        </div>
      </div>
    </header>

    <div class="p-6 lg:p-8" id="views">
      <!-- views injected by JS -->
    </div>

    <p class="text-center text-xs text-muted pb-6">
      💡 ده ديمو تفاعلي للعرض — البيانات تجريبية. السيستم الفعلي Next.js + Supabase مع صلاحيات RLS كاملة.
    </p>
  </main>
</div>

<script>
// ---------------------------------------------------------------------------
// Navigation config
// ---------------------------------------------------------------------------
const NAV = [
  { key: "dashboard",   label: "لوحة التحكم",     icon: "layout-dashboard" },
  { key: "projects",    label: "المشاريع",        icon: "folder-kanban", badge: "12" },
  { key: "employees",   label: "الموظفون",        icon: "users", badge: "24" },
  { key: "evaluations", label: "التقييمات",       icon: "clipboard-check" },
  { key: "leaderboard", label: "لوحة الصدارة",    icon: "trophy" },
  { key: "standup",     label: "الستاندب اليومي", icon: "sunrise" },
  { key: "attendance",  label: "الحضور والأجازات", icon: "clock" },
  { key: "peerReview",  label: "تقييم الزملاء",   icon: "heart-handshake" },
  { key: "notifications", label: "الإشعارات",     icon: "bell", badge: "3", badgeDanger: true },
];

const navEl = document.getElementById("nav");
NAV.forEach(n => {
  const a = document.createElement("a");
  a.className = "nav-item flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium";
  a.dataset.key = n.key;
  a.onclick = () => go(n.key);
  a.innerHTML = `<i data-lucide="${n.icon}" class="size-4"></i> ${n.label}` +
    (n.badge ? `<span class="ms-auto text-xs ${n.badgeDanger ? 'badge-danger' : 'badge-muted'} px-2 py-0.5 rounded-full">${n.badge}</span>` : "");
  navEl.appendChild(a);
});

// ---------------------------------------------------------------------------
// Reusable bits
// ---------------------------------------------------------------------------
const av = (cls, init, size=7) => `<span class="avatar ${cls} size-${size}">${init}</span>`;
const prog = (w, color) => `<div class="progress-bar"><div style="width:${w}%; background:${color}"></div></div>`;

// ---------------------------------------------------------------------------
// Views
// ---------------------------------------------------------------------------
const VIEWS = {};

VIEWS.dashboard = () => `
  <div class="mb-6">
    <h1 class="text-2xl font-bold">أهلاً بك، أحمد الجمل 👋</h1>
    <p class="text-sm text-muted mt-1">نظرة سريعة على شغل فريقك النهارده — الجمعة ٥ يونيو ٢٠٢٦</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    ${kpiCard("المشاريع النشطة","12","folder-kanban","260",`<span class="text-xs text-[var(--success)] font-medium inline-flex items-center gap-0.5"><i data-lucide="trending-up" class="size-3"></i> +٢ هذا الأسبوع</span>`)}
    ${kpiCard("تاسكاتي المفتوحة","٧","check-square","80",`<span class="text-xs text-muted">من أصل ١٢</span>`, prog(58,"var(--warning)"))}
    ${kpiCard("أعضاء الفريق","24","users","145",`<span class="text-xs text-muted">٤ أقسام</span>`,`<div class="mt-2 flex items-center gap-1.5 text-xs"><span class="size-2 rounded-full dot-success"></span> ٢٢ نشط <span class="ms-3 size-2 rounded-full dot-warning"></span> ٢ فريلانس</div>`)}
    ${kpiCard("إشعارات غير مقروءة","٣","bell","25",`<span class="text-xs text-muted">١ إشارة، ٢ تاسكات</span>`)}
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
    <div class="lg:col-span-2 card">
      <div class="flex items-center justify-between p-5 border-default border-b">
        <h2 class="text-base font-semibold">نظرة على الأقسام</h2>
        <a class="text-xs font-medium text-primary hover:underline cursor-pointer">تفاصيل →</a>
      </div>
      <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
        ${deptCard("تحسين محركات البحث","#22c55e","6 أعضاء","٥ مشاريع نشطة · محمد سامح",87)}
        ${deptCard("الإعلانات والسوشيال","#3b82f6","7 أعضاء","٣ مشاريع نشطة · نهى عمرو",73)}
        ${deptCard("البرمجة","#a855f7","5 أعضاء","٢ مشاريع نشطة · كريم حسن",92)}
        ${deptCard("المحتوى","#f59e0b","6 أعضاء","٢ مشاريع نشطة · سارة محمود",65)}
      </div>
    </div>

    <div class="card">
      <div class="p-5 border-default border-b">
        <h2 class="text-base font-semibold">حمل العمل (Workload)</h2>
        <p class="text-xs text-muted">نسبة الإشغال هذا الأسبوع</p>
      </div>
      <ul class="p-5 space-y-4">
        ${workItem("av-2","نع","نهى عمرو",95,"var(--danger)","🔴 فوق الطاقة — يُنصح بإعادة توزيع")}
        ${workItem("av-1","أج","أحمد الجمل",78,"var(--warning)","🟡 شبه ممتلئ")}
        ${workItem("av-3","مس","محمد سامح",52,"var(--success)","🟢 متاح")}
        ${workItem("av-4","سم","سارة محمود",45,"var(--success)","🟢 متاح")}
      </ul>
    </div>
  </div>

  <div class="card">
    <div class="flex items-center justify-between p-5 border-default border-b">
      <h2 class="text-base font-semibold">أحدث المشاريع</h2>
      <a onclick="go('projects')" class="text-xs font-medium text-primary hover:underline cursor-pointer">عرض الكل →</a>
    </div>
    ${projectsTable()}
  </div>
`;

const kpiCard = (label, value, icon, hue, extra="", below="") => `
  <div class="card p-5">
    <div class="flex items-center justify-between">
      <p class="text-sm text-muted">${label}</p>
      <div class="size-9 rounded-md flex items-center justify-center" style="background:oklch(0.94 0.06 ${hue}); color:oklch(0.4 0.18 ${hue})">
        <i data-lucide="${icon}" class="size-4"></i>
      </div>
    </div>
    <div class="mt-3 flex items-baseline gap-2">
      <span class="text-3xl font-bold">${value}</span> ${extra}
    </div>
    ${below ? `<div class="mt-3">${below}</div>` : ""}
  </div>`;

const deptCard = (name, color, members, sub, pct) => `
  <div class="rounded-lg border border-default p-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2"><span class="size-3 rounded-full" style="background:${color}"></span><span class="font-medium">${name}</span></div>
      <span class="badge-muted text-xs px-2 py-0.5 rounded-full">${members}</span>
    </div>
    <p class="text-xs text-muted mt-1">${sub}</p>
    <div class="mt-3 flex items-center justify-between text-xs"><span class="text-muted">معدل الإنجاز الشهري</span><span class="font-semibold">${pct}%</span></div>
    <div class="mt-1">${prog(pct, color)}</div>
  </div>`;

const workItem = (cls, init, name, pct, color, note) => `
  <li>
    <div class="flex items-center justify-between text-sm">
      <div class="flex items-center gap-2">${av(cls, init)} ${name}</div>
      <span class="text-xs font-semibold" style="color:${color}">${pct}%</span>
    </div>
    <div class="mt-2">${prog(pct, color)}</div>
    <p class="text-[10px] text-muted mt-1">${note}</p>
  </li>`;

const projectsTable = () => `
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="text-muted text-xs">
        <tr class="border-default border-b">
          <th class="text-start font-medium p-4">المشروع</th>
          <th class="text-start font-medium p-4">القسم</th>
          <th class="text-start font-medium p-4">الفريق</th>
          <th class="text-start font-medium p-4">التقدم</th>
          <th class="text-start font-medium p-4">الحالة</th>
        </tr>
      </thead>
      <tbody>
        ${projRow("حملة رمضان ٢٠٢٦","Acme Corp","الإعلانات",["av-2:نع","av-1:أج","av-4:سم"],68,"#3b82f6","نشط","badge-success")}
        ${projRow("إعادة تصميم موقع البنك","EgyptBank","البرمجة",["av-3:كح","av-1:أج"],45,"#a855f7","نشط","badge-success")}
        ${projRow("حملة SEO الربعية","RealEstate Pro","SEO",["av-3:مس","av-1:أج","av-5:+٢"],82,"#22c55e","نشط","badge-success")}
        ${projRow("كتالوج المنتجات","FashionHub","المحتوى",["av-4:سم","av-2:نع"],30,"#f59e0b","متوقف مؤقتاً","badge-warning")}
      </tbody>
    </table>
  </div>`;

const projRow = (name, client, dept, team, pct, color, status, badge) => `
  <tr class="border-default border-b hover:bg-[var(--muted)] cursor-pointer" onclick="go('projectDetail')">
    <td class="p-4"><div class="font-medium">${name}</div><div class="text-xs text-muted">${client}</div></td>
    <td class="p-4 text-muted">${dept}</td>
    <td class="p-4"><div class="flex -space-x-2 rtl:space-x-reverse">${team.map(t=>{const[c,i]=t.split(":");return `<span class="avatar ${c} size-7 border-2 border-white">${i}</span>`}).join("")}</div></td>
    <td class="p-4 w-44">${prog(pct,color)}<span class="text-[10px] text-muted">${pct}%</span></td>
    <td class="p-4"><span class="${badge} text-xs px-2 py-0.5 rounded-full">${status}</span></td>
  </tr>`;

// ---- Projects (list + kanban) ----
VIEWS.projects = () => `
  <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
    <div>
      <h1 class="text-2xl font-bold">المشاريع</h1>
      <p class="text-sm text-muted mt-1">كل المشاريع اللي أنت عضو فيها أو بتديرها</p>
    </div>
    <button class="inline-flex items-center gap-2 h-10 rounded-md btn-primary px-4 text-sm font-medium"><i data-lucide="plus" class="size-4"></i> مشروع جديد</button>
  </div>
  <div class="card mb-6">
    <div class="p-5 border-default border-b"><h2 class="text-base font-semibold">قائمة المشاريع</h2></div>
    ${projectsTable()}
  </div>
  <div class="card">
    <div class="flex flex-wrap items-center justify-between gap-3 p-5 border-default border-b">
      <div><h2 class="text-base font-semibold">حملة رمضان ٢٠٢٦ — Kanban</h2><p class="text-xs text-muted">Acme Corp · قسم الإعلانات</p></div>
      <div class="seg flex rounded-md border border-default p-0.5 text-xs">
        <button class="on rounded px-3 py-1">Kanban</button>
        <button class="rounded px-3 py-1 text-muted">قائمة</button>
        <button class="rounded px-3 py-1 text-muted">تقويم</button>
      </div>
    </div>
    ${kanban()}
  </div>`;

VIEWS.projectDetail = VIEWS.projects;

const kanban = () => `
  <div class="p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
    ${kanCol("للعمل","badge-muted",2,[
      kanCard("إعداد تقرير الأداء الشهري","badge-warning","عالية","2026-06-08","av-1","أج","المحتوى"),
      kanCard("مراجعة كلمات مفتاحية الـ landing","badge-muted","متوسطة","","av-3","مس","SEO"),
    ])}
    ${kanCol("قيد التنفيذ","badge-info",2,[
      kanCard("تحسين Schema markup للمنتج","badge-danger","عاجلة","2026-06-06","av-1","أج","SEO","3","1"),
      kanCard("حملة رمضان — تصميم البوستات","badge-warning","عالية","","av-2","نع","الإعلانات"),
    ])}
    ${kanCol("مراجعة","badge-purple",1,[
      kanCard("مقالة أفضل ممارسات SEO ٢٠٢٦","badge-muted","متوسطة","","av-4","سم","المحتوى"),
    ])}
    ${kanCol("مكتمل","badge-success",5,[
      kanCard("تحديث ميتا تاجز الصفحات","badge-muted","","","av-3","مس","SEO",null,null,true),
    ])}
    ${kanCol("ملغي","badge-muted",0,[])}
  </div>`;

const kanCol = (title, badge, count, cards) => `
  <div class="rounded-lg border border-default bg-[var(--muted)] p-3 space-y-2 min-h-32">
    <div class="flex items-center justify-between"><span class="text-sm font-semibold">${title}</span><span class="${badge} text-[10px] px-2 py-0.5 rounded-full">${count}</span></div>
    ${cards.length ? cards.join("") : `<p class="text-center text-[11px] text-muted py-6">لا تاسكات</p>`}
  </div>`;

const kanCard = (title, pbadge, prio, due, avc, avi, dept, comments=null, files=null, done=false) => `
  <div class="task-card rounded-md border border-default bg-card p-3 space-y-2 ${done?'opacity-80':''}">
    <div class="text-sm font-medium ${done?'line-through text-muted':''}">${title}</div>
    <div class="flex items-center gap-1.5 flex-wrap">
      ${prio?`<span class="${pbadge} text-[10px] px-2 py-0.5 rounded-full">${prio}</span>`:""}
      ${due?`<span class="text-[10px] text-muted" dir="ltr">Due: ${due}</span>`:""}
    </div>
    <div class="flex items-center justify-between">
      ${av(avc,avi,6)}
      ${comments?`<div class="flex items-center gap-1 text-[10px] text-muted"><i data-lucide="message-square" class="size-3"></i> ${comments} <i data-lucide="paperclip" class="size-3 ms-1"></i> ${files}</div>`:`<span class="text-[10px] text-muted">${dept}</span>`}
    </div>
  </div>`;

// ---- Employees ----
VIEWS.employees = () => {
  const rows = [
    ["av-1","أج","أحمد الجمل","ahmed@everestads.com","مدير عام","badge-purple","الإدارة","Senior","نشط"],
    ["av-2","نع","نهى عمرو","noha@everestads.com","قائد فريق","badge-info","الإعلانات","Senior","نشط"],
    ["av-3","مس","محمد سامح","m.sameh@everestads.com","قائد فريق","badge-info","SEO","Senior","نشط"],
    ["av-4","سم","سارة محمود","sara@everestads.com","عضو فريق","badge-muted","المحتوى","Junior","نشط"],
    ["av-5","كح","كريم حسن","karim@everestads.com","قائد فريق","badge-info","البرمجة","Senior","نشط"],
    ["av-3","يا","ياسمين علي","yasmin@everestads.com","عضو فريق","badge-muted","الإعلانات","Trainee","فريلانس"],
  ];
  return `
  <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
    <div><h1 class="text-2xl font-bold">الموظفون</h1><p class="text-sm text-muted mt-1">٢٤ موظف · ٤ أقسام</p></div>
    <button class="inline-flex items-center gap-2 h-10 rounded-md btn-primary px-4 text-sm font-medium"><i data-lucide="user-plus" class="size-4"></i> دعوة موظف</button>
  </div>
  <div class="card overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="text-muted text-xs"><tr class="border-default border-b">

  window.scrollTo({ top: 0, behavior: "smooth" });
}
