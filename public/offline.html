<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>غير متصل — إدارة الموظفين</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
    background: #f7f7f8;
    color: #171717;
    text-align: center;
    padding: 24px;
  }
  .card {
    max-width: 380px;
  }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { color: #666; font-size: 14px; line-height: 1.7; margin: 0 0 20px; }
  button {
    background: #0a0a0a; color: #fff; border: 0; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>محتاج اتصال بالإنترنت عشان تشوف بياناتك. اتأكد من الشبكة وحاول تاني.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
